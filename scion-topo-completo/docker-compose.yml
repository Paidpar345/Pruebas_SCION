services:
  isd1-as110:
    build: .
    container_name: isd1-as110
    networks:
      scion_net:
        ipv4_address: 172.20.1.10
    volumes:
      - ./topo/isd1-as110:/scion/config:ro
      - scion_data_110:/var/lib/scion
    cap_add: [NET_BIND_SERVICE]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pgrep -x scion-daemon > /dev/null && pgrep -x scion-router > /dev/null"]
      interval: 15s
      timeout: 5s
      retries: 15
      start_period: 45s

  isd1-as120:
    build: .
